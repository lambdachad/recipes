<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrambled Eggs</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font: 400 17px/1.7 Charter, "Bitstream Charter", "Sitka Text", Cambria, serif;
      color: #222;
      background: #fff;
    }
    article { max-width: 640px; margin: 0 auto; padding: 56px 24px 96px; }
    header { margin-bottom: 40px; }
    h1 { font-size: 36px; font-weight: 700; line-height: 1.1; letter-spacing: -0.75px; margin-bottom: 28px; }
    h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin: 48px 0 16px; }
    header img { display: block; width: 100%; max-height: 420px; object-fit: cover; border-radius: 10px; }
    .ingredients { list-style: none; }
    .ingredients li { display: flex; align-items: baseline; padding: 4px 0; gap: 8px; }
    .name { flex: 1; }
    .link { font-size: 13px; margin-left: 4px; }
    .qty, .cost { font-size: 15px; text-align: right; }
    .qty { min-width: 48px; }
    .cost { min-width: 80px; }
    .total { font-weight: 700; margin-top: 4px; padding-top: 8px; border-top: 1px solid #ddd; }
    .steps { white-space: pre-line; line-height: 1.7; }
    @media (max-width: 480px) {
      article { padding: 32px 16px 64px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <article>
    <a href="index.html">Recipes</a>

    <header>
      <h1>Scrambled Eggs</h1>
      <img src="scrambled-eggs.jpg" alt="Scrambled Eggs">
    </header>

    <h2>Ingredients</h2>
    
    <ul class="ingredients">
      <li><span class="name">Eggs <a class="link" href="https://www.carrefouregypt.com/mafegy/en/white-eggs/royal-white-eggs-30-pcs/p/659534" target="_blank">[link]</a></span><span class="qty">6</span><span class="cost">EGP 22</span></li>
      <li><span class="name">Butter <a class="link" href="https://www.carrefouregypt.com/mafegy/en/mixed-butter/fern-mixed-butter-1k/p/195679" target="_blank">[link]</a></span><span class="qty">25 g</span><span class="cost">EGP 4</span></li>
      <li><span class="name">Salt</span></li>
      <li class="total"><span class="name">Total</span><span class="cost">EGP 26</span></li>
    </ul>

    <h2>Steps</h2>
    <div class="steps">1. Crack 6 eggs into a bowl with salt.
2. Melt 25 g butter in a pan over low heat.
3. Add the eggs and stir gently until just set, about 5 minutes.</div>
  </article>
</body>
</html>
